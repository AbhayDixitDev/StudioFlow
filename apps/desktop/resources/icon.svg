<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>

  <!-- Audio waveform bars (center) -->
  <g transform="translate(256, 256)">
    <!-- Left bars -->
    <rect x="-120" y="-35" width="16" height="70" rx="8" fill="url(#wave1)" opacity="0.7"/>
    <rect x="-95" y="-55" width="16" height="110" rx="8" fill="url(#wave1)" opacity="0.8"/>
    <rect x="-70" y="-75" width="16" height="150" rx="8" fill="url(#wave1)" opacity="0.9"/>
    <rect x="-45" y="-50" width="16" height="100" rx="8" fill="url(#wave1)"/>

    <!-- Center bars (tallest) -->
    <rect x="-20" y="-90" width="16" height="180" rx="8" fill="url(#wave1)"/>
    <rect x="5" y="-70" width="16" height="140" rx="8" fill="url(#wave1)"/>

    <!-- Right bars -->
    <rect x="30" y="-55" width="16" height="110" rx="8" fill="url(#wave1)"/>
    <rect x="55" y="-80" width="16" height="160" rx="8" fill="url(#wave1)" opacity="0.9"/>
    <rect x="80" y="-45" width="16" height="90" rx="8" fill="url(#wave1)" opacity="0.8"/>
    <rect x="105" y="-30" width="16" height="60" rx="8" fill="url(#wave1)" opacity="0.7"/>
  </g>

  <!-- Play triangle overlay (subtle) -->
  <polygon points="230,200 230,312 310,256" fill="white" opacity="0.15"/>

  <!-- "SF" text at bottom -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="white" opacity="0.9" letter-spacing="8">SF</text>
</svg>
