appId: com.studioflow.app
productName: StudioFlow
copyright: Copyright 2024

directories:
  output: release
  buildResources: resources

files:
  - src/**/*
  - renderer/**/*
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: StudioFlow

publish: null
